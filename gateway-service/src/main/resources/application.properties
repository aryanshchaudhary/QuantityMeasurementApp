# ================= BASIC =================
spring.application.name=gateway-service

server.port=${PORT}
server.address=0.0.0.0

# Disable default Spring Security (for now)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# ================= EUREKA =================
eureka.client.service-url.defaultZone=https://service-registry-esv4.onrender.com/eureka

# Ensure registration works properly
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Timeouts (important for Render)
eureka.client.eureka-server-connect-timeout-seconds=10
eureka.client.eureka-server-read-timeout-seconds=10

#  INSTANCE CONFIG (CRITICAL)
eureka.instance.hostname=gateway-service-vg52.onrender.com
eureka.instance.prefer-ip-address=false
eureka.instance.secure-port-enabled=true
eureka.instance.non-secure-port-enabled=false

# Use hostname instead of port
eureka.instance.instance-id=${spring.application.name}:${eureka.instance.hostname}

# Health + status URLs (VERY IMPORTANT)
eureka.instance.statusPageUrl=https://gateway-service-vg52.onrender.com/actuator/info
eureka.instance.healthCheckUrl=https://gateway-service-vg52.onrender.com/actuator/health
eureka.instance.homePageUrl=https://gateway-service-vg52.onrender.com

# ================= ACTUATOR =================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# ================= ROUTES =================

# AUTH SERVICE
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

# QUANTITY SERVICE
spring.cloud.gateway.routes[1].id=quantity-service
spring.cloud.gateway.routes[1].uri=lb://quantity-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/**

# HISTORY SERVICE
spring.cloud.gateway.routes[2].id=history-service
spring.cloud.gateway.routes[2].uri=lb://history-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/history/**

# ================= CORS =================
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true