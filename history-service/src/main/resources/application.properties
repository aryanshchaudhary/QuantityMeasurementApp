spring.application.name=history-service
server.port=${PORT:8083}
server.address=0.0.0.0

# MySQL (env variables with fallback)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/history_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Eureka
eureka.client.service-url.defaultZone=https://service-registry-esv4.onrender.com/eureka
# Instance config
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}