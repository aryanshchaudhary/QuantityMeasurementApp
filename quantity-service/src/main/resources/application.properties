spring.application.name=quantity-service

server.port=${PORT}
server.address=0.0.0.0

# DATABASE
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/quantity_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# EUREKA
eureka.client.service-url.defaultZone=https://service-registry-esv4.onrender.com/eureka/

eureka.instance.hostname=${RENDER_EXTERNAL_HOSTNAME}
eureka.instance.prefer-ip-address=false
eureka.instance.secure-port-enabled=true
eureka.instance.non-secure-port-enabled=false
eureka.instance.secure-port=443

eureka.instance.instance-id=${spring.application.name}:${eureka.instance.hostname}

eureka.instance.status-page-url=https://${RENDER_EXTERNAL_HOSTNAME}/actuator/info
eureka.instance.health-check-url=https://${RENDER_EXTERNAL_HOSTNAME}/actuator/health
eureka.instance.home-page-url=https://${RENDER_EXTERNAL_HOSTNAME}

# ACTUATOR
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true